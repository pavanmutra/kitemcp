name: Weekly Reports

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date override (YYYY-MM-DD)'
        required: false
        type: string

jobs:
  generate-reports:
    name: Generate Weekly Reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Markdown Report
        run: npm run report
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}

      - name: Generate Excel Export
        run: npm run export
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports-${{ github.run_id }}
          path: |
            reports/*.xlsx
            reports/**/*.md
          retention-days: 30

  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: generate-reports
    steps:
      - name: Create workflow summary
        run: |
          echo "## Weekly Report Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reports generated and saved as artifacts" >> $GITHUB_STEP_SUMMARY